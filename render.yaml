services:
  - type: web
    name: prestige-motors-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: FRONTEND_ORIGIN
        sync: false
    disk:
      name: prestige-motors-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1

  - type: static
    name: prestige-motors-web
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
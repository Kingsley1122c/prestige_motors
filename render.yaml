services:
  - type: web
    name: prestige-motors-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_FILE_PATH
        value: /var/data/database.sqlite
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://prestige-motors-web.onrender.com
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_CURRENCY
        value: USD
    disk:
      name: prestige-motors-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: prestige-motors-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: VITE_API_BASE_URL
        value: https://prestige-motors-api.onrender.com
      - key: VITE_META_PIXEL_ID
        sync: false
      - key: VITE_TIKTOK_PIXEL_ID
        sync: false
      - key: VITE_GOOGLE_TAG_ID
        sync: false
      - key: VITE_GOOGLE_ADS_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html